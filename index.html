<!DOCTYPE html>
<html lang="en" class="lang-en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rosas Behoundja</title>
  <meta name="author" content="Rosas Behoundja">
  <meta name="robots" content="index, follow">
  <meta name="language" content="English">
  <meta name="google-site-verification" content="7LE16gRwEbXNFjLQxXWDU3iZPV9r8dh1upcFCdOlqtM"/>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
</head>
<body class="max-w-[820px] mx-auto px-4 sm:px-6 py-6 sm:py-10 text-neutral-900 bg-white">

  <canvas id="bg-network" aria-hidden="true"></canvas>

  <!-- Top Navigation Bar -->
  <nav class="border-b border-neutral-200 pb-4 mb-8">
    <div class="flex items-center justify-between">
      <!-- Desktop nav links -->
      <div class="hidden sm:flex items-center gap-6 font-mono text-sm">
        <a href="index.html" class="text-[#1a1de3] font-semibold underline underline-offset-4">/ home</a>
        <a href="work.html" class="text-neutral-600 hover:text-[#1a1de3] transition-colors">/ work</a>
        <a href="blog.html" class="text-neutral-600 hover:text-[#1a1de3] transition-colors">/ blog</a>
      </div>

      <!-- Mobile brand & Right controls -->
      <div class="flex items-center justify-between sm:justify-end w-full sm:w-auto gap-3">
        <span class="sm:hidden font-display font-bold text-neutral-900 text-lg">Rosas<span class="text-[#1a1de3]">.</span></span>
        
        <div class="flex items-center gap-3">
          <button class="lang-switch text-xs font-mono border border-neutral-200 px-2.5 py-1 rounded hover:bg-neutral-100 hover:border-[#1a1de3] transition-all cursor-pointer" id="langBtn" onclick="toggleLanguage()">🇫🇷 FR</button>
          <button id="menuToggleBtn" class="sm:hidden text-neutral-700 hover:text-[#1a1de3] p-1 text-lg cursor-pointer" aria-label="Toggle menu" onclick="toggleMobileMenu()">
            <i class="fas fa-bars" id="menuIcon"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Mobile Dropdown Menu -->
    <div id="mobileMenu" class="hidden sm:hidden flex-col gap-3 pt-4 border-t border-neutral-100 mt-3 font-mono text-sm">
      <a href="index.html" class="text-[#1a1de3] font-semibold py-1">/ home</a>
      <a href="work.html" class="text-neutral-600 hover:text-[#1a1de3] py-1">/ work</a>
      <a href="blog.html" class="text-neutral-600 hover:text-[#1a1de3] py-1">/ blog</a>
    </div>
  </nav>

  <!-- Profile Header Section -->
  <header class="flex flex-col-reverse sm:flex-row items-start sm:items-center justify-between gap-6 mb-12">
    <div class="flex flex-col gap-2">
      <h1 class="font-display text-2xl sm:text-3xl font-bold tracking-tight text-neutral-900">Rosas Behoundja<span class="text-[#1a1de3]">.</span></h1>
      <div class="flex items-center gap-4 flex-wrap mt-2 text-lg">
        <a href="mailto:perrierosas@gmail.com" title="Email" class="text-[#1a1de3] hover:opacity-80 transition-opacity"><i class="fas fa-envelope"></i></a>
        <a href="https://linkedin.com/in/rosasbehoundja" target="_blank" title="LinkedIn" class="text-[#1a1de3] hover:opacity-80 transition-opacity"><i class="fab fa-linkedin"></i></a>
        <a href="https://github.com/rosasbehoundja" target="_blank" title="GitHub" class="text-[#1a1de3] hover:opacity-80 transition-opacity"><i class="fab fa-github"></i></a>
        <a href="cv/Rosas_Behoundja_Resume.pdf" target="_blank" title="CV / Resume" class="text-[#1a1de3] hover:opacity-80 transition-opacity flex items-center gap-1">
          <i class="fas fa-file-pdf"></i>
          <span class="text-sm font-sans font-medium">CV</span>
        </a>
      </div>
    </div>
    <img class="w-28 h-28 sm:w-36 sm:h-36 rounded-lg object-cover flex-shrink-0" src="media/me/Firefly.jpg" alt="Rosas Behoundja">
  </header>

  <section class="mb-10">
    <h2 class="font-display text-lg font-bold text-[#1a1de3] lowercase mb-3 tracking-wide before:content-['#_'] before:opacity-50">
      <span class="fr-text">à propos</span>
      <span class="en-text">about</span>
    </h2>

    <div class="fr-text markdown-body" id="about-fr"></div>
    <div class="en-text markdown-body" id="about-en"></div>
  </section>

  <section id="news" class="mb-10">
    <h2 class="font-display text-lg font-bold text-[#1a1de3] lowercase mb-3 tracking-wide before:content-['#_'] before:opacity-50">
      <span class="fr-text">récemment</span>
      <span class="en-text">news</span>
    </h2>

    <div class="flex flex-col gap-3 mb-5" id="news-list"></div>

    <div class="flex items-center gap-4 text-xs font-mono mt-4" id="newsPagination" style="display: none;">
      <button id="prevNews" class="px-3 py-1 border border-neutral-200 rounded text-neutral-800 disabled:opacity-30 disabled:cursor-not-allowed hover:enabled:bg-neutral-100 hover:enabled:border-[#1a1de3] transition-all cursor-pointer" disabled><i class="fas fa-chevron-left"></i></button>
      <span id="newsPageIndicator">1 / 1</span>
      <button id="nextNews" class="px-3 py-1 border border-neutral-200 rounded text-neutral-800 disabled:opacity-30 disabled:cursor-not-allowed hover:enabled:bg-neutral-100 hover:enabled:border-[#1a1de3] transition-all cursor-pointer"><i class="fas fa-chevron-right"></i></button>
    </div>

    <div id="news-more"></div>
  </section>

  <section id="beyond" class="mb-10">
    <h2 class="font-display text-lg font-bold text-[#1a1de3] lowercase mb-3 tracking-wide before:content-['#_'] before:opacity-50">
      <span class="fr-text">et sinon</span>
      <span class="en-text">besides that</span>
    </h2>

    <div class="fr-text markdown-body" id="beyond-fr"></div>
    <div class="en-text markdown-body" id="beyond-en"></div>
  </section>

  <footer class="mt-16 pt-4 text-xs text-neutral-400 border-t border-dashed border-neutral-200">
    <p class="fr-text">Inspiré par le site de <a href="https://www.leonlan.com/" target="_blank" class="text-neutral-500 hover:text-[#1a1de3] underline">Leon Lan</a></p>
    <p class="en-text">Inspired by <a href="https://www.leonlan.com/" target="_blank" class="text-neutral-500 hover:text-[#1a1de3] underline">Leon Lan</a>'s website</p>
  </footer>

  <script src="js/script.js"></script>
  <script src="js/home-loader.js"></script>

</body>
</html>
